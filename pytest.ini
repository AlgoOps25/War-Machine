[pytest]
# War Machine — pytest configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Short traceback by default; use --tb=long locally when debugging
addopts =
    --tb=short
    --strict-markers
    -q

# Registered custom markers (avoids PytestUnknownMarkWarning)
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks tests that require live DB or API credentials
    unit: marks pure unit tests with no external dependencies

# Per-test wall-clock timeout (requires pytest-timeout)
# Prevents a single hung test from blocking CI indefinitely
timeout = 60

# Minimum pytest version
minversion = 7.0
