# War Machine CI Pipeline  (Phase 1.23)
# ─────────────────────────────────────────────────────────────────────────────
# Runs on every push / PR to main.
# Blocks Railway deploy when syntax check OR any unit test fails.
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout

      - name: Syntax check — all Python files
        run: |
          echo "Running py_compile on all .py files..."
          find . -name "*.py" \
            -not -path "./.git/*" \
            -not -path "./venv/*" \
            -not -path "./.venv/*" \
            | sort \
            | xargs python -m py_compile
          echo "✅ All files pass syntax check"

      - name: Run unit tests
        env:
          DATABASE_URL: ""
          EODHD_API_KEY: "CI_DUMMY"
          DISCORD_WEBHOOK_URL: ""
          TRADIER_API_KEY: "CI_DUMMY"
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --timeout=60 \
            -m "not integration" \
            --ignore=tests/db_diagnostic.py \
            --ignore=tests/generate_test_trades.py
