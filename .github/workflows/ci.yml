# War Machine CI Pipeline
# Runs on every push/PR to main.
# Blocks Railway deploy when syntax or tests fail.
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check — all Python files
        run: |
          echo "Running py_compile on all .py files..."
          find . -name "*.py" \
            -not -path "./.git/*" \
            -not -path "./venv/*" \
            -not -path "./.venv/*" \
            | sort \
            | xargs python -m py_compile
          echo "✅ All files pass syntax check"

      - name: Run tests
        run: |
          if [ -d tests ] && [ -n "$(ls tests/*.py 2>/dev/null)" ]; then
            echo "Running pytest..."
            pytest tests/ -v --tb=short
          else
            echo "⚠️  No tests directory found — skipping pytest"
            echo "Add tests/ directory with test_*.py files to enable this step"
          fi
